<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0b" />
  <meta name="description" content="Dorelus Davidson — Technicien IT & Développeur Web — Paris, France" />
  <title>Dorelus Davidson — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- Scanlines overlay -->
<div id="scanlines" aria-hidden="true"></div>

<!-- Canvas for effects -->
<canvas id="fx-canvas" aria-hidden="true"></canvas>

<!-- Terminal window -->
<div id="terminal-window">

  <!-- Title bar (macOS style) -->
  <div id="title-bar">
    <div id="traffic-lights">
      <button class="tl tl-close" aria-label="Fermer"></button>
      <button class="tl tl-min"   aria-label="Minimiser"></button>
      <button class="tl tl-max"   aria-label="Plein écran"></button>
    </div>
    <span id="title-bar-text">davidson@portfolio:~</span>
    <div id="title-bar-right">
      <span id="theme-indicator" role="button" tabindex="0" title="Changer de thème">dark</span>
    </div>
  </div>

  <!-- Output area -->
  <div id="terminal-output" role="log" aria-live="polite" aria-label="Terminal output"></div>

  <!-- Input area -->
  <div id="terminal-input-row">
    <span id="prompt-label" aria-hidden="true">
      <span class="p-user">davidson</span><span class="p-at">@</span><span class="p-host">portfolio</span><span class="p-sep">:</span><span class="p-dir">~</span><span class="p-dollar">$</span>
    </span>
    <div id="input-wrapper">
      <input
        id="terminal-input"
        type="text"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        aria-label="Terminal input"
        placeholder="type 'help'..."
        enterkeyhint="send"
      />
      <div id="autocomplete-dropdown" role="listbox" aria-label="Suggestions"></div>
    </div>
  </div>

  <!-- Mobile command bar -->
  <nav id="mobile-cmd-bar" aria-label="Commandes rapides">
    <button class="mob-cmd" data-cmd="whoami" aria-label="À propos">
      <span class="mob-cmd-icon" aria-hidden="true">👤</span>
      <span class="mob-cmd-label">about</span>
    </button>
    <button class="mob-cmd" data-cmd="skills" aria-label="Compétences">
      <span class="mob-cmd-icon" aria-hidden="true">⚡</span>
      <span class="mob-cmd-label">skills</span>
    </button>
    <button class="mob-cmd" data-cmd="projects" aria-label="Expérience">
      <span class="mob-cmd-icon" aria-hidden="true">💼</span>
      <span class="mob-cmd-label">xp</span>
    </button>
    <button class="mob-cmd" data-cmd="education" aria-label="Formation">
      <span class="mob-cmd-icon" aria-hidden="true">🎓</span>
      <span class="mob-cmd-label">edu</span>
    </button>
    <button class="mob-cmd" data-cmd="contact" aria-label="Contact">
      <span class="mob-cmd-icon" aria-hidden="true">📬</span>
      <span class="mob-cmd-label">contact</span>
    </button>
    <button class="mob-cmd mob-cmd-hire" data-cmd="sudo hire davidson" aria-label="Recruter">
      <span class="mob-cmd-icon" aria-hidden="true">✨</span>
      <span class="mob-cmd-label">hire!</span>
    </button>
  </nav>

</div>

<script src="main.js"></script>
</body>
</html>
